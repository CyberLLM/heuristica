  <link rel="stylesheet" href="style.css">
  <style>
    .payment-container {
      max-width: 560px;
      margin: 48px auto 60px auto;
    }

    .payment-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .payment-header h1 {
      font-size: 1.4em;
      font-weight: 600;
      color: var(--text-primary, #e6edf3);
      margin-bottom: 12px;
    }

    .price-box {
      display: inline-block;
      font-size: 2.4em;
      font-weight: 700;
      color: #d4a574;
      margin-bottom: 4px;
    }

    .tax-info {
      font-size: 0.9em;
      color: var(--text-secondary, #8b949e);
    }

    .product-details {
      background: var(--bg-secondary, #161B22);
      border: 1px solid var(--border-color, #30363d);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .product-details ul {
      margin: 0;
      padding-left: 20px;
      columns: 1 !important;
    }

    .product-details li {
      margin-bottom: 10px;
      font-size: 0.95em;
      color: var(--text-secondary, #8b949e);
      line-height: 1.5;
    }

    .product-details li strong {
      color: var(--text-primary, #e6edf3);
    }

    .consent-box {
      background: var(--bg-secondary, #161B22);
      border: 1px solid var(--border-color, #30363d);
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }

    .checkbox-group:last-child {
      margin-bottom: 0;
    }

    .checkbox-group input[type="checkbox"] {
      margin-top: 3px;
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .checkbox-group label {
      font-size: 0.9em;
      color: var(--text-secondary, #8b949e);
      cursor: pointer;
      line-height: 1.5;
    }

    .checkbox-group a {
      color: #d4a574;
      text-decoration: underline;
    }

    .pay-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #d4a574;
      color: #0D1117;
      border: none;
      border-radius: 6px;
      font-size: 1.1em;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .pay-btn:hover {
      background: #c19660;
      color: #0D1117;
    }

    .pay-btn:disabled,
    .pay-btn[aria-disabled="true"] {
      background: #30363d;
      color: #8b949e;
      cursor: not-allowed;
      pointer-events: none;
    }

    .security-note {
      text-align: center;
      margin-top: 16px;
      font-size: 0.85em;
      color: var(--text-secondary, #8b949e);
    }

    .security-note img {
      height: 22px;
      vertical-align: middle;
      margin-left: 8px;
      opacity: 0.8;
    }

    .legal-links {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85em;
    }

    .legal-links a {
      color: var(--text-secondary, #8b949e);
      text-decoration: underline;
      margin: 0 10px;
    }

    @media (max-width: 600px) {
      .payment-container {
        margin: 24px 16px 40px 16px;
      }
      .price-box {
        font-size: 2em;
      }
    }
  </style>

<body>

    <a href="#" data-tally-open="obAOEx">Kontakt</a>

  <div class="payment-container">

    <div class="consent-box">
      <div class="checkbox-group">
        <input type="checkbox" id="terms_accepted">
        <label for="terms_accepted">
          Akceptuję <a href="/regulamin" target="_blank">regulamin</a> oraz
          <a href="/polityka" target="_blank">politykę prywatności</a> Heuristica
        </label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="przelewy24_terms">
        <label for="przelewy24_terms">
          Akceptuję <a href="https://www.przelewy24.pl/regulamin" target="_blank">regulamin Przelewy24</a>
        </label>
      </div>
    </div>

    <a href="https://s.przelewy24.pl/2JMcgTY9t1yS" id="pay-btn" class="pay-btn" aria-disabled="true">
      Przejdź do płatności
    </a>

    <div class="security-note">
      Bezpieczne płatności:
      <img src="https://www.przelewy24.pl/themes/przelewy24/assets/img/base/przelewy24_logo_2022.svg" alt="Przelewy24">
    </div>

    <div class="legal-links">
      <a href="/regulamin">Regulamin</a>
      <a href="/polityka">Polityka prywatności</a>
    </div>
  </div>

  <script>
    const btn = document.getElementById('pay-btn');
    const t1 = document.getElementById('terms_accepted');
    const t2 = document.getElementById('przelewy24_terms');

    function updateBtn() {
      if (t1.checked && t2.checked) {
        btn.removeAttribute('aria-disabled');
      } else {
        btn.setAttribute('aria-disabled', 'true');
      }
    }

    t1.addEventListener('change', updateBtn);
    t2.addEventListener('change', updateBtn);

    btn.addEventListener('click', function(e) {
      if (this.getAttribute('aria-disabled') === 'true') {
        e.preventDefault();
      }
    });
  </script>
