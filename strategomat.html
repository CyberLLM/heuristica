<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATEGOMAT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: Inter, system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: #a78bfa;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #999;
            font-size: 0.95rem;
        }

        /* Upload Section */
        .section {
            background-color: #1a1a1a;
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .section h2 {
            font-size: 1.2rem;
            color: #a78bfa;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .upload-zone {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: rgba(167, 139, 250, 0.02);
        }

        .upload-zone:hover {
            border-color: #a78bfa;
            background-color: rgba(167, 139, 250, 0.05);
        }

        .upload-zone.dragover {
            border-color: #a78bfa;
            background-color: rgba(167, 139, 250, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .upload-text {
            margin-bottom: 1rem;
        }

        .upload-text p {
            margin: 0.5rem 0;
        }

        .upload-text strong {
            color: #a78bfa;
        }

        .upload-text small {
            color: #666;
        }

        .file-input {
            display: none;
        }

        .btn {
            background-color: #a78bfa;
            color: #0f0f0f;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            margin: 0.5rem;
        }

        .btn:hover {
            background-color: #b8a1f5;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background-color: #444;
            color: #999;
            cursor: not-allowed;
            transform: none;
        }

        .file-info {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: rgba(167, 139, 250, 0.1);
            border-left: 3px solid #a78bfa;
            border-radius: 4px;
            display: none;
        }

        .file-info.visible {
            display: block;
        }

        .file-name {
            font-weight: 600;
            color: #a78bfa;
            margin-bottom: 0.5rem;
        }

        .file-preview {
            font-size: 0.85rem;
            color: #999;
            max-height: 100px;
            overflow-y: auto;
            line-height: 1.4;
        }

        /* Pipeline Section */
        #pipeline-section {
            display: none;
        }

        #pipeline-section.visible {
            display: block;
        }

        .pipeline-tracker {
            list-style: none;
        }

        .pipeline-step {
            padding: 1rem;
            margin-bottom: 0.75rem;
            background-color: rgba(167, 139, 250, 0.05);
            border-left: 3px solid #444;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .pipeline-step.active {
            border-left-color: #a78bfa;
            background-color: rgba(167, 139, 250, 0.1);
        }

        .pipeline-step.complete {
            border-left-color: #4ade80;
        }

        .pipeline-step.error {
            border-left-color: #ef4444;
            background-color: rgba(239, 68, 68, 0.05);
        }

        .status-icon {
            min-width: 24px;
            text-align: center;
            font-weight: bold;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #a78bfa;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .pipeline-content {
            flex: 1;
        }

        .pipeline-title {
            font-weight: 600;
            color: #e0e0e0;
        }

        .pipeline-timer {
            font-size: 0.8rem;
            color: #999;
            margin-top: 0.25rem;
        }

        .sub-steps {
            margin-top: 0.75rem;
            padding-left: 1rem;
            border-left: 2px solid #333;
        }

        .sub-step {
            padding: 0.5rem 0;
            font-size: 0.9rem;
            color: #999;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sub-step .status-icon {
            min-width: 16px;
            font-size: 0.8rem;
        }

        /* Result Section */
        #result-section {
            display: none;
        }

        #result-section.visible {
            display: block;
        }

        .result-actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .btn-secondary {
            background-color: #333;
            color: #e0e0e0;
        }

        .btn-secondary:hover {
            background-color: #444;
        }

        .markdown-output {
            background-color: #1a1a1a;
            border-radius: 8px;
            padding: 2rem;
            line-height: 1.8;
        }

        .markdown-output h1 {
            font-size: 1.75rem;
            font-weight: 500;
            color: #a78bfa;
            margin: 2rem 0 1rem 0;
            padding-bottom: 1rem;
            border-bottom: 2px solid #333;
        }

        .markdown-output h1:first-child {
            margin-top: 0;
        }

        .markdown-output h2 {
            font-size: 1.25rem;
            font-weight: 500;
            color: #a78bfa;
            margin: 1.5rem 0 0.75rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #333;
        }

        .markdown-output h3 {
            font-size: 1rem;
            font-weight: 500;
            color: #c8b4f8;
            margin: 1rem 0 0.5rem 0;
        }

        .markdown-output p {
            color: #d4d4d4;
            margin: 0.75rem 0;
        }

        .markdown-output ul,
        .markdown-output ol {
            margin: 1rem 0 1rem 1.5rem;
            color: #d4d4d4;
        }

        .markdown-output li {
            margin: 0.5rem 0;
        }

        .markdown-output strong {
            color: #a78bfa;
            font-weight: 600;
        }

        .markdown-output em {
            color: #b8a1f5;
        }

        /* Error Messages */
        .error-message {
            background-color: rgba(239, 68, 68, 0.1);
            border-left: 3px solid #ef4444;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 0;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .error-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: #4ade80;
            color: #0f0f0f;
            padding: 1rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.error {
            background-color: #ef4444;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .logo {
                font-size: 2rem;
            }

            .section {
                padding: 1.5rem;
            }

            .result-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .markdown-output {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">STRATEGOMAT</div>
            <div class="subtitle">Platforma do automatycznego generowania strategii marketingowych</div>
        </header>

        <!-- Upload Section -->
        <section id="upload-section" class="section">
            <h2>Krok 1: Wgraj brief</h2>

            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">📄</div>
                <div class="upload-text">
                    <p><strong>Przeciągnij plik .txt tutaj</strong></p>
                    <small>lub kliknij aby wybrać plik</small>
                </div>
            </div>

            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-preview" id="filePreview"></div>
            </div>

            <div style="text-align: center; margin-top: 1.5rem;">
                <input type="text" id="apiKeyInput" placeholder="Wstaw klucz API OpenAI (opcjonalnie dla fallback'u)"
                       style="background-color: #2a2a2a; border: 1px solid #444; padding: 0.75rem; border-radius: 6px; color: #e0e0e0; width: 100%; max-width: 400px; margin-bottom: 1rem;">
                <div style="text-align: center;">
                    <button class="btn" id="analyzeBtn" disabled>Uruchom analizę</button>
                </div>
            </div>

            <div class="error-message" id="uploadError">
                <div class="error-title">Błąd</div>
                <div id="uploadErrorText"></div>
            </div>
        </section>

        <!-- Pipeline Section -->
        <section id="pipeline-section" class="section">
            <h2>Postęp analizy</h2>
            <ul class="pipeline-tracker" id="pipelineTracker"></ul>
            <div class="error-message" id="pipelineError">
                <div class="error-title">Błąd w pipeline</div>
                <div id="pipelineErrorText"></div>
            </div>
        </section>

        <!-- Result Section -->
        <section id="result-section" class="section">
            <h2>Dokument strategiczny</h2>

            <div class="result-actions">
                <button class="btn" id="downloadBtn">⬇️ Pobierz jako .md</button>
                <button class="btn" id="copyBtn">📋 Kopiuj do schowka</button>
                <button class="btn btn-secondary" id="newAnalysisBtn">🔄 Nowa analiza</button>
            </div>

            <div class="markdown-output" id="markdownOutput"></div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Configuration
        const CONFIG = {
            OLLAMA_URL: 'http://localhost:11434/api/generate',
            OLLAMA_MODEL: 'glm-5.1:cloud',
            MAX_RETRIES: 2,
            TIMEOUT: 60000
        };

        // State
        let uploadedContent = '';
        let pipelineSteps = {
            planner: { status: 'pending', timer: 0, substeps: [] },
            experts: {
                konkurencja: { status: 'pending', timer: 0 },
                trendy: { status: 'pending', timer: 0 },
                konsumenci: { status: 'pending', timer: 0 },
                zasoby: { status: 'pending', timer: 0 }
            },
            analyst: { status: 'pending', timer: 0 }
        };

        // Utility: Show toast notification
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Utility: Format time
        function formatTime(ms) {
            return (ms / 1000).toFixed(1) + 's';
        }

        // Call Ollama or OpenAI with retry logic
        async function callLLM(systemPrompt, userPrompt) {
            const apiKey = document.getElementById('apiKeyInput').value.trim();

            // Try Ollama first (up to MAX_RETRIES)
            for (let attempt = 1; attempt <= CONFIG.MAX_RETRIES; attempt++) {
                try {
                    const response = await callOllama(systemPrompt, userPrompt);
                    return response;
                } catch (error) {
                    if (attempt === CONFIG.MAX_RETRIES) {
                        if (apiKey) {
                            try {
                                const response = await callOpenAI(apiKey, systemPrompt, userPrompt);
                                return response;
                            } catch (openaiError) {
                                throw new Error(`Ollama failed (${CONFIG.MAX_RETRIES}x) i OpenAI fallback też nie zadziałał: ${openaiError.message}`);
                            }
                        } else {
                            throw error;
                        }
                    }
                }
            }
        }

        // Call Ollama
        async function callOllama(systemPrompt, userPrompt) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), CONFIG.TIMEOUT);

            try {
                const response = await fetch(CONFIG.OLLAMA_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: CONFIG.OLLAMA_MODEL,
                        prompt: userPrompt,
                        system: systemPrompt,
                        stream: false
                    }),
                    signal: controller.signal
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                return data.response || '';
            } finally {
                clearTimeout(timeoutId);
            }
        }

        // Call OpenAI (fallback)
        async function callOpenAI(apiKey, systemPrompt, userPrompt) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), CONFIG.TIMEOUT);

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4-turbo',
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userPrompt }
                        ],
                        temperature: 0.7,
                        max_tokens: 2000
                    }),
                    signal: controller.signal
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } finally {
                clearTimeout(timeoutId);
            }
        }

        // Update pipeline UI
        function updatePipelineUI() {
            const tracker = document.getElementById('pipelineTracker');
            tracker.innerHTML = '';

            // Planner
            const plannerEl = createPipelineStep(
                'planner',
                'Planista',
                'Przygotowanie minibriefów dla ekspertów'
            );
            tracker.appendChild(plannerEl);

            // Experts container
            const expertsContainer = document.createElement('li');
            expertsContainer.className = 'pipeline-step';

            const expertsContent = document.createElement('div');
            expertsContent.style.width = '100%';

            const expertsTitle = document.createElement('div');
            expertsTitle.className = 'pipeline-title';
            expertsTitle.innerHTML = '📊 Analiza równoległa (4 eksperci)';
            expertsContent.appendChild(expertsTitle);

            const subSteps = document.createElement('div');
            subSteps.className = 'sub-steps';

            const expertsKeys = ['konkurencja', 'trendy', 'konsumenci', 'zasoby'];
            const expertsNames = ['Konkurencja', 'Trendy i PESTEL', 'Konsumenci', 'Zasoby marki'];

            expertsKeys.forEach((key, i) => {
                const subStep = createSubStep(key, expertsNames[i]);
                subSteps.appendChild(subStep);
            });

            expertsContent.appendChild(subSteps);
            expertsContainer.appendChild(expertsContent);
            tracker.appendChild(expertsContainer);

            // Analyst
            const analystEl = createPipelineStep(
                'analyst',
                'Analityk',
                'Formulowanie finalnego dokumentu strategicznego'
            );
            tracker.appendChild(analystEl);
        }

        function createPipelineStep(key, title, subtitle) {
            const li = document.createElement('li');
            li.className = 'pipeline-step';
            li.id = `step-${key}`;

            const status = pipelineSteps[key] || pipelineSteps[key];
            if (status && status.status === 'pending') {
                li.classList.add('pending');
            } else if (status && status.status === 'active') {
                li.classList.add('active');
            } else if (status && status.status === 'complete') {
                li.classList.add('complete');
            }

            const icon = document.createElement('div');
            icon.className = 'status-icon';
            icon.innerHTML = getStatusIcon(status.status);

            const content = document.createElement('div');
            content.className = 'pipeline-content';

            const titleEl = document.createElement('div');
            titleEl.className = 'pipeline-title';
            titleEl.textContent = title;
            content.appendChild(titleEl);

            const subtitleEl = document.createElement('div');
            subtitleEl.style.fontSize = '0.85rem';
            subtitleEl.style.color = '#999';
            subtitleEl.textContent = subtitle;
            content.appendChild(subtitleEl);

            if (status && status.status === 'complete' && status.timer > 0) {
                const timerEl = document.createElement('div');
                timerEl.className = 'pipeline-timer';
                timerEl.textContent = `⏱ ${formatTime(status.timer)}`;
                content.appendChild(timerEl);
            }

            li.appendChild(icon);
            li.appendChild(content);
            return li;
        }

        function createSubStep(key, name) {
            const div = document.createElement('div');
            div.className = 'sub-step';
            div.id = `substep-${key}`;

            const status = pipelineSteps.experts[key] || { status: 'pending' };

            const icon = document.createElement('div');
            icon.className = 'status-icon';
            icon.textContent = getStatusIcon(status.status);

            const text = document.createElement('div');
            text.style.flex = '1';
            text.textContent = name;
            if (status.status === 'complete' && status.timer > 0) {
                text.textContent += ` (${formatTime(status.timer)})`;
            }

            div.appendChild(icon);
            div.appendChild(text);
            return div;
        }

        function getStatusIcon(status) {
            switch (status) {
                case 'pending': return '[ ]';
                case 'active': return '<span class="spinner"></span>';
                case 'complete': return '✓';
                case 'error': return '[!]';
                default: return '[ ]';
            }
        }

        function updateStepStatus(step, status, timer = 0) {
            if (step.includes('expert-')) {
                const expertKey = step.replace('expert-', '');
                pipelineSteps.experts[expertKey].status = status;
                if (timer) pipelineSteps.experts[expertKey].timer = timer;
            } else {
                pipelineSteps[step].status = status;
                if (timer) pipelineSteps[step].timer = timer;
            }
            updatePipelineUI();
        }

        // Main pipeline orchestration
        async function runPipeline(briefContent) {
            try {
                // Show pipeline section
                document.getElementById('pipeline-section').classList.add('visible');
                document.getElementById('result-section').classList.remove('visible');
                document.getElementById('pipelineError').classList.remove('visible');
                updatePipelineUI();

                // Step 1: Planner
                updateStepStatus('planner', 'active');
                const plannerStart = performance.now();
                let plannerOutput;

                try {
                    const plannerPrompt = `Jesteś Planistą strategicznym. Otrzymujesz brief marketingowy i Twoim zadaniem jest przygotowanie 4 oddzielnych minibriefów dla ekspertów.
Odpowiedz WYŁĄCZNIE w formacie JSON, bez żadnego tekstu przed ani po. Struktura:
{
  "konkurencja": "minibrief dla eksperta od analizy konkurencji, max 150 słów",
  "trendy": "minibrief dla eksperta od trendów i analizy PESTEL, max 150 słów",
  "konsumenci": "minibrief dla eksperta od zachowań konsumenckich, max 150 słów",
  "zasoby marki": "minibrief dla eksperta od zasobów i tożsamości marki, max 150 słów"
}`;

                    const response = await callLLM(plannerPrompt, briefContent);
                    plannerOutput = JSON.parse(response.trim());
                } catch (error) {
                    if (error instanceof SyntaxError) {
                        throw new Error('Planista nie zwrócił poprawnego JSON');
                    }
                    throw error;
                }

                const plannerTime = performance.now() - plannerStart;
                updateStepStatus('planner', 'complete', plannerTime);

                // Step 2: Four Experts in Parallel
                updateStepStatus('expert-konkurencja', 'active');
                updateStepStatus('expert-trendy', 'active');
                updateStepStatus('expert-konsumenci', 'active');
                updateStepStatus('expert-zasoby', 'active');

                const expertPrompts = {
                    konkurencja: {
                        system: 'Jesteś ekspertem od analizy konkurencji. Na podstawie briefu napisz minirapport (max 300 słów) zawierający: głównych konkurentów, ich pozycjonowanie, luki rynkowe i zagrożenia. Pisz konkretnie, bez ogólników.',
                        content: plannerOutput.konkurencja
                    },
                    trendy: {
                        system: 'Jesteś ekspertem od trendów makroekonomicznych i analizy PESTEL. Na podstawie briefu napisz minirapport (max 300 słów) zawierający: kluczowe trendy polityczne, ekonomiczne, społeczne, technologiczne, środowiskowe i prawne istotne dla tej kategorii. Pisz konkretnie.',
                        content: plannerOutput.trendy
                    },
                    konsumenci: {
                        system: 'Jesteś ekspertem od zachowań konsumenckich i insightów. Na podstawie briefu napisz minirapport (max 300 słów) zawierający: profil konsumenta, kluczowe insighty, bariery i motywatory zakupowe, niezaspokojone potrzeby.',
                        content: plannerOutput.konsumenci
                    },
                    zasoby: {
                        system: 'Jesteś ekspertem od strategii marki i jej zasobów. Na podstawie briefu napisz minirapport (max 300 słów) zawierający: aktualne pozycjonowanie marki, jej przewagi, słabości, tożsamość i potencjał do repozycjonowania.',
                        content: plannerOutput['zasoby marki']
                    }
                };

                const expertPromises = Object.entries(expertPrompts).map(async ([key, prompt]) => {
                    const start = performance.now();
                    const response = await callLLM(prompt.system, prompt.content);
                    const timer = performance.now() - start;
                    updateStepStatus(`expert-${key}`, 'complete', timer);
                    return { key, response };
                });

                const expertResults = await Promise.all(expertPromises);
                const experts = {};
                expertResults.forEach(({ key, response }) => {
                    experts[key] = response;
                });

                // Step 3: Analyst
                updateStepStatus('analyst', 'active');
                const analystStart = performance.now();

                const analystSystem = `Jesteś Analitykiem strategicznym. Otrzymujesz 4 miniraporty od ekspertów i Twoje zadanie to napisanie finalnego dokumentu strategicznego w formacie Markdown.

Dokument musi zawierać:
# Strategia — [nazwa marki z briefu]

## 1. Synteza sytuacyjna
## 2. Kluczowe insights strategiczne
## 3. Analiza SWOT
## 4. Rekomendowana pozycja strategiczna
## 5. Priorytety działań (TOP 5)
## 6. Ryzyka i mitygacje

Pisz precyzyjnie. Unikaj ogólników. Każda sekcja minimum 3 konkretne punkty.`;

                const analystUserPrompt = `RAPORT EKSPERTA 1 (Konkurencja):
${experts.konkurencja}

RAPORT EKSPERTA 2 (Trendy):
${experts.trendy}

RAPORT EKSPERTA 3 (Konsumenci):
${experts.konsumenci}

RAPORT EKSPERTA 4 (Zasoby marki):
${experts.zasoby}

Sformułuj finalny dokument strategiczny.`;

                const analytResult = await callLLM(analystSystem, analystUserPrompt);
                const analystTime = performance.now() - analystStart;
                updateStepStatus('analyst', 'complete', analystTime);

                // Render result
                renderResult(analytResult);
                document.getElementById('result-section').classList.add('visible');
                document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
                showToast('✓ Analiza ukończona!');

            } catch (error) {
                updateStepStatus('planner', 'error');
                const errorSection = document.getElementById('pipelineError');
                document.getElementById('pipelineErrorText').textContent = error.message;
                errorSection.classList.add('visible');
                showToast(error.message, true);
            }
        }

        // Render markdown result
        function renderResult(markdown) {
            const outputDiv = document.getElementById('markdownOutput');
            outputDiv.innerHTML = marked.parse(markdown);
        }

        // File upload handlers
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = '.txt';
        fileInput.className = 'file-input';

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFileUpload(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFileUpload(e.target.files);
        });

        function handleFileUpload(files) {
            if (files.length === 0) return;

            const file = files[0];
            if (!file.name.endsWith('.txt')) {
                showToast('Wgraj plik .txt', true);
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                uploadedContent = e.target.result;
                document.getElementById('fileName').textContent = `📄 ${file.name}`;

                const lines = uploadedContent.split('\n').slice(0, 3);
                document.getElementById('filePreview').textContent = lines.join('\n');
                document.getElementById('fileInfo').classList.add('visible');
                document.getElementById('analyzeBtn').disabled = false;
                document.getElementById('uploadError').classList.remove('visible');
            };

            reader.onerror = () => {
                const errorSection = document.getElementById('uploadError');
                document.getElementById('uploadErrorText').textContent = 'Nie udało się odczytać pliku';
                errorSection.classList.add('visible');
            };

            reader.readAsText(file);
        }

        // Button handlers
        document.getElementById('analyzeBtn').addEventListener('click', () => {
            if (uploadedContent) {
                runPipeline(uploadedContent);
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const markdown = document.getElementById('markdownOutput').innerText;
            const blob = new Blob([markdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'strategia.md';
            a.click();
            URL.revokeObjectURL(url);
            showToast('✓ Plik pobrano');
        });

        document.getElementById('copyBtn').addEventListener('click', async () => {
            const markdown = document.getElementById('markdownOutput').innerText;
            try {
                await navigator.clipboard.writeText(markdown);
                showToast('✓ Skopiowano do schowka');
            } catch {
                showToast('Nie udało się skopiować', true);
            }
        });

        document.getElementById('newAnalysisBtn').addEventListener('click', () => {
            uploadedContent = '';
            document.getElementById('fileInfo').classList.remove('visible');
            document.getElementById('analyzeBtn').disabled = true;
            document.getElementById('upload-section').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('pipeline-section').classList.remove('visible');
            document.getElementById('result-section').classList.remove('visible');
            pipelineSteps = {
                planner: { status: 'pending', timer: 0 },
                experts: {
                    konkurencja: { status: 'pending', timer: 0 },
                    trendy: { status: 'pending', timer: 0 },
                    konsumenci: { status: 'pending', timer: 0 },
                    zasoby: { status: 'pending', timer: 0 }
                },
                analyst: { status: 'pending', timer: 0 }
            };
        });
    </script>
</body>
</html>
