<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteka BG UP Lublin</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    background: #1a1d27;
    border-bottom: 1px solid #2a2d3a;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .topbar h1 { font-size: 1rem; font-weight: 600; color: #fff; white-space: nowrap; }

  .topbar-fields {
    display: flex; gap: 10px; align-items: center; flex: 1; flex-wrap: wrap;
  }

  input, select {
    background: #0f1117;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    color: #e0e0e0;
    padding: 7px 12px;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: #4f6ef7; }
  #apiKey { width: 220px; }
  #modelSelect { width: 180px; }

  .btn {
    background: #4f6ef7; color: #fff; border: none;
    border-radius: 8px; padding: 7px 16px; font-size: 0.85rem;
    cursor: pointer; white-space: nowrap; transition: background 0.2s;
  }
  .btn:hover { background: #3a57e0; }
  .btn.secondary { background: #23263a; }
  .btn.secondary:hover { background: #2e3250; }
  .btn:disabled { background: #23263a; color: #444; cursor: default; }

  #topStatus { font-size: 0.78rem; color: #888; }
  #topStatus.error { color: #f87171; }

  /* Chat */
  #chat {
    flex: 1; overflow-y: auto; padding: 24px 20px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .msg { display: flex; gap: 12px; max-width: 820px; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; flex-shrink: 0; margin-top: 2px;
  }
  .msg.user .avatar { background: #4f6ef7; }
  .msg.bot .avatar { background: #23263a; border: 1px solid #2a2d3a; }

  .bubble {
    background: #1a1d27; border: 1px solid #2a2d3a;
    border-radius: 12px; padding: 12px 16px;
    font-size: 0.9rem; line-height: 1.6; max-width: 100%;
  }
  .msg.user .bubble { background: #1e2a5e; border-color: #2a3a7a; color: #c8d4ff; }

  .bubble table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 0.85rem; }
  .bubble th, .bubble td { border: 1px solid #2a2d3a; padding: 7px 12px; text-align: left; }
  .bubble th { background: #23263a; color: #d0d8ff; }
  .bubble tr:nth-child(even) td { background: #181b27; }
  .bubble strong { color: #d0d8ff; }
  .bubble ul, .bubble ol { padding-left: 20px; }
  .bubble li { margin-bottom: 4px; }
  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble a { color: #7a9cf7; text-decoration: none; }
  .bubble a:hover { text-decoration: underline; }

  .stat-pills { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .pill {
    background: #0f1117; border: 1px solid #2a2d3a;
    border-radius: 20px; padding: 3px 10px; font-size: 0.75rem; color: #888;
  }
  .pill strong { color: #d0d8ff; }

  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .suggestion-btn {
    background: #23263a; border: 1px solid #2a2d3a; color: #9aa8d0;
    border-radius: 20px; padding: 5px 12px; font-size: 0.78rem;
    cursor: pointer; transition: all 0.2s;
  }
  .suggestion-btn:hover { background: #2e3250; border-color: #4f6ef7; color: #d0d8ff; }

  /* PDF wyniki */
  .pdf-section { margin-top: 14px; }
  .pdf-section-title {
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: #555; margin-bottom: 8px;
  }
  .pdf-tag {
    display: inline-block; font-size: 0.72rem; padding: 2px 8px;
    border-radius: 10px; margin-bottom: 8px; font-weight: 600;
  }
  .pdf-tag.sylabus { background: #1a3a2a; color: #6ee7b7; }
  .pdf-tag.artykul { background: #1a2a3a; color: #7ab8f7; }
  .pdf-tag.inny    { background: #2a2a1a; color: #f7d07a; }

  .katalog-group { margin-bottom: 14px; }
  .katalog-query {
    font-size: 0.8rem; color: #888; margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .katalog-query a { font-size: 0.75rem; color: #4f6ef7; }

  .katalog-item {
    background: #0f1117; border: 1px solid #2a2d3a;
    border-radius: 8px; padding: 8px 12px; margin-bottom: 6px;
    font-size: 0.85rem;
  }
  .katalog-item-title { color: #d0d8ff; margin-bottom: 3px; }
  .katalog-item-status { font-size: 0.75rem; color: #6ee7b7; }

  /* Spinner */
  .typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .dot {
    width: 7px; height: 7px; background: #4f6ef7;
    border-radius: 50%; animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* Input bar */
  .inputbar {
    background: #1a1d27; border-top: 1px solid #2a2d3a;
    padding: 14px 20px; display: flex; gap: 10px; align-items: flex-end;
  }

  #promptInput {
    flex: 1; resize: none; min-height: 42px; max-height: 140px;
    background: #0f1117; border: 1px solid #2a2d3a; border-radius: 10px;
    color: #e0e0e0; padding: 10px 14px; font-size: 0.93rem;
    font-family: inherit; line-height: 1.4; outline: none;
    transition: border-color 0.2s; overflow-y: auto;
  }
  #promptInput:focus { border-color: #4f6ef7; }

  /* Drag & drop overlay */
  #dropzone {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(15,17,23,0.88);
    border: 3px dashed #4f6ef7; border-radius: 16px; margin: 16px;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; color: #4f6ef7;
    font-size: 1.2rem; pointer-events: none;
  }
  #dropzone.active { display: flex; }

  #sendBtn {
    width: 42px; height: 42px; border-radius: 10px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }

  #pdfBtn {
    width: 42px; height: 42px; border-radius: 10px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #444; gap: 8px;
  }
  .empty-state .icon { font-size: 2.5rem; }
  .empty-state p { font-size: 0.9rem; }

  .examples { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 12px; }
  .example-btn {
    background: #1a1d27; border: 1px solid #2a2d3a; color: #666;
    border-radius: 20px; padding: 7px 16px; font-size: 0.82rem;
    cursor: pointer; transition: all 0.2s;
  }
  .example-btn:hover { border-color: #4f6ef7; color: #9aa8d0; }
</style>
</head>
<body>

<div id="dropzone">📄 Upuść PDF tutaj</div>
<input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handleFileSelect(event)">

<!-- Topbar -->
<div class="topbar">
  <h1>📚 BG UP Lublin</h1>
  <div class="topbar-fields">
    <input type="password" id="apiKey" placeholder="Klucz OpenAI (sk-...)" oninput="onApiKeyChange()">
    <button class="btn secondary" onclick="loadModels()">Pobierz modele</button>
    <select id="modelSelect"><option value="">— najpierw klucz —</option></select>
    <div style="width:1px;height:24px;background:#2a2d3a;margin:0 4px;"></div>
    <input type="text" id="bibLogin" placeholder="Login biblioteki" style="width:140px;" oninput="updateBibStatus()">
    <input type="password" id="bibHaslo" placeholder="Hasło" style="width:110px;" oninput="updateBibStatus()">
    <span id="bibStatus"></span>
    <span id="topStatus"></span>
  </div>
</div>

<!-- Chat -->
<div id="chat">
  <div class="empty-state" id="emptyState">
    <div class="icon">📖</div>
    <p>Zadaj pytanie lub wgraj PDF (sylabus, artykuł, dokument)</p>
    <div class="examples">
      <button class="example-btn" onclick="useExample(this)">Znajdź książki o biologii molekularnej</button>
      <button class="example-btn" onclick="useExample(this)">Pokaż w tabeli podręczniki do chemii</button>
      <button class="example-btn" onclick="useExample(this)">Czy są dostępne książki o genetyce?</button>
    </div>
  </div>
</div>

<!-- Input -->
<div class="inputbar">
  <button class="btn secondary" id="pdfBtn" onclick="document.getElementById('fileInput').click()" title="Wgraj PDF">📄</button>
  <textarea id="promptInput" placeholder="Zapytaj o zasoby biblioteki... lub wgraj PDF przyciskiem 📄" rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="btn" id="sendBtn" onclick="send()" disabled>➤</button>
</div>

<script>
  const API_BASE = 'https://bgup.heuristica.pl';
  const KEY_STORAGE = 'bgup_api_key';
  const MODEL_STORAGE = 'bgup_model';
  const BIB_LOGIN_STORAGE = 'bgup_bib_login';
  let isLoading = false;
  let ostatnieWyniki = [];

  marked.setOptions({ breaks: true });

  window.onload = () => {
    const savedKey = sessionStorage.getItem(KEY_STORAGE);
    const savedModel = sessionStorage.getItem(MODEL_STORAGE);
    const savedLogin = sessionStorage.getItem(BIB_LOGIN_STORAGE);
    if (savedKey) {
      document.getElementById('apiKey').value = savedKey;
      loadModels(savedModel);
    }
    if (savedLogin) {
      document.getElementById('bibLogin').value = savedLogin;
      updateBibStatus();
    }
    setupDragDrop();
  };

  // ---- Drag & Drop ----
  function setupDragDrop() {
    document.addEventListener('dragover', e => {
      e.preventDefault();
      document.getElementById('dropzone').classList.add('active');
    });
    document.addEventListener('dragleave', e => {
      if (!e.relatedTarget) document.getElementById('dropzone').classList.remove('active');
    });
    document.addEventListener('drop', e => {
      e.preventDefault();
      document.getElementById('dropzone').classList.remove('active');
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.pdf')) processPdf(file);
    });
  }

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) processPdf(file);
    e.target.value = '';
  }

  // ---- API ----
  function onApiKeyChange() {
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('modelSelect').innerHTML = '<option value="">— pobierz modele —</option>';
  }

  async function loadModels(preselectModel = null) {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) { setStatus('Podaj klucz API.', true); return; }
    setStatus('Pobieranie modeli...');
    try {
      const r = await fetch(`${API_BASE}/models?api_key=${encodeURIComponent(apiKey)}`);
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail);
      const sel = document.getElementById('modelSelect');
      sel.innerHTML = data.models.map(m =>
        `<option value="${m}" ${m === (preselectModel || 'gpt-4o-mini') ? 'selected' : ''}>${m}</option>`
      ).join('');
      sessionStorage.setItem(KEY_STORAGE, apiKey);
      document.getElementById('sendBtn').disabled = false;
      setStatus('');
    } catch(e) {
      setStatus('Błąd: ' + e.message, true);
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function useExample(btn) {
    document.getElementById('promptInput').value = btn.textContent;
    autoResize(document.getElementById('promptInput'));
    send();
  }

  // ---- Wyszukiwanie tekstowe ----
  function updateBibStatus() {
    const login = document.getElementById('bibLogin').value.trim();
    const haslo = document.getElementById('bibHaslo').value.trim();
    const el = document.getElementById('bibStatus');
    if (login && haslo) {
      el.innerHTML = `<span style="color:#6ee7b7;font-size:0.8rem;">✓ konto aktywne + IBUK</span>`;
    } else if (login) {
      el.innerHTML = `<span style="color:#f7d07a;font-size:0.8rem;">⚠ podaj hasło</span>`;
    } else {
      el.innerHTML = '';
    }
  }

  function getBibCreds() {
    const login = document.getElementById('bibLogin').value.trim();
    const haslo = document.getElementById('bibHaslo').value.trim();
    if (login) sessionStorage.setItem(BIB_LOGIN_STORAGE, login);
    return { bib_login: login, bib_haslo: haslo };
  }

  async function send() {
    if (isLoading) return;
    const prompt = document.getElementById('promptInput').value.trim();
    const apiKey = document.getElementById('apiKey').value.trim();
    const model = document.getElementById('modelSelect').value;
    if (!prompt) return;
    if (!apiKey || !model) { setStatus('Podaj klucz API i wybierz model.', true); return; }

    document.getElementById('emptyState')?.remove();
    appendUserMsg(prompt);
    document.getElementById('promptInput').value = '';
    document.getElementById('promptInput').style.height = 'auto';

    const loadingId = appendTyping();
    setLoading(true);

    try {
      const r = await fetch(`${API_BASE}/search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, api_key: apiKey, model, ...getBibCreds(), ostatnie_wyniki: ostatnieWyniki }),
      });
      const data = await r.json();
      removeTyping(loadingId);
      if (!r.ok) throw new Error(data.detail || 'Błąd serwera');
      if (!data.followup && data.wyniki) ostatnieWyniki = data.wyniki;
      appendBotMsg(data);
      sessionStorage.setItem(MODEL_STORAGE, model);
    } catch(e) {
      removeTyping(loadingId);
      appendError(e.message);
    } finally {
      setLoading(false);
    }
  }

  // ---- PDF ----
  async function processPdf(file) {
    const apiKey = document.getElementById('apiKey').value.trim();
    const model = document.getElementById('modelSelect').value;
    if (!apiKey || !model) { setStatus('Podaj klucz API i wybierz model.', true); return; }

    document.getElementById('emptyState')?.remove();
    appendUserMsg(`📄 ${file.name} (${(file.size/1024).toFixed(0)} KB)`);

    const loadingId = appendTyping();
    setLoading(true);

    try {
      const { bib_login, bib_haslo } = getBibCreds();
      const form = new FormData();
      form.append('file', file);
      form.append('api_key', apiKey);
      form.append('model', model);
      form.append('bib_login', bib_login);
      form.append('bib_haslo', bib_haslo);

      const r = await fetch(`${API_BASE}/pdf`, { method: 'POST', body: form });
      const data = await r.json();
      removeTyping(loadingId);
      if (!r.ok) throw new Error(data.detail || 'Błąd serwera');
      appendPdfMsg(data);
    } catch(e) {
      removeTyping(loadingId);
      appendError(e.message);
    } finally {
      setLoading(false);
    }
  }

  // ---- Renderowanie ----
  function appendUserMsg(text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="avatar">👤</div><div class="bubble">${escHtml(text)}</div>`;
    chat.appendChild(div);
    scrollBottom();
  }

  function appendBotMsg(data) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg bot';

    const gsLink = data.gs_link
      ? `<a href="${escHtml(data.gs_link)}" target="_blank" style="font-size:0.75rem;color:#4f6ef7;text-decoration:none;border:1px solid #2a3a6a;border-radius:20px;padding:3px 10px;">Google Scholar →</a>`
      : '';
    const pills = `<div class="stat-pills">
      <div class="pill">szukano: <strong>${escHtml(data.keyword)}</strong></div>
      <div class="pill">w katalogu: <strong>${data.total}</strong></div>
      <div class="pill">pokazano: <strong>${data.pokazano}</strong></div>
      ${gsLink}
    </div>`;

    const sugestie = data.sugestie?.length
      ? `<div class="suggestions">${data.sugestie.map(s =>
          `<button class="suggestion-btn" onclick="askSuggestion('${escAttr(s)}')">🔍 ${escHtml(s)}</button>`
        ).join('')}</div>`
      : '';

    const ibuk = data.ibuk?.length
      ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid #2a2d3a;">
          <div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em;color:#555;margin-bottom:6px;">IBUK Libra (e-książki)</div>
          ${data.ibuk.map(b =>
            `<div style="margin-bottom:4px;font-size:0.85rem;">
              📖 <a href="${escHtml(b.url)}" target="_blank" style="color:#7ab8f7;">${escHtml(b.tytul)}</a>
            </div>`
          ).join('')}
        </div>`
      : '';

    div.innerHTML = `
      <div class="avatar">📚</div>
      <div>${pills}<div class="bubble">${marked.parse(data.odpowiedz || 'Brak odpowiedzi.')}${sugestie}${ibuk}</div></div>`;
    chat.appendChild(div);
    scrollBottom();
  }

  function appendPdfMsg(data) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg bot';

    const tagClass = data.typ === 'sylabus' ? 'sylabus' : data.typ === 'artykul' ? 'artykul' : 'inny';
    const tagLabel = data.typ === 'sylabus' ? 'Sylabus' : data.typ === 'artykul' ? 'Artykuł naukowy' : 'Dokument';

    let html = `<span class="pdf-tag ${tagClass}">${tagLabel}</span>`;
    if (data.tytul_dokumentu) html += `<p style="font-weight:600;color:#d0d8ff;margin-bottom:8px;">${escHtml(data.tytul_dokumentu)}</p>`;
    if (data.streszczenie) html += `<p style="margin-bottom:10px;color:#b0b8d0;">${escHtml(data.streszczenie)}</p>`;

    if (data.slowa_kluczowe?.length) {
      html += `<div style="margin-bottom:12px;">${data.slowa_kluczowe.map(s =>
        `<span style="background:#23263a;border:1px solid #2a2d3a;border-radius:12px;padding:2px 10px;font-size:0.75rem;margin-right:6px;color:#9aa8d0;">${escHtml(s)}</span>`
      ).join('')}</div>`;
    }

    if (data.lista_lektur?.length) {
      html += `<div class="pdf-section"><div class="pdf-section-title">Lista lektur z sylabusa</div>`;
      html += `<ul style="padding-left:18px;margin-bottom:10px;">${data.lista_lektur.map(l =>
        `<li style="margin-bottom:4px;font-size:0.85rem;color:#c0c8e0;">${escHtml(l)}</li>`
      ).join('')}</ul></div>`;
    }

    if (data.wyniki_katalogu?.length) {
      html += `<div class="pdf-section"><div class="pdf-section-title">Znalezione w katalogu BG UP</div>`;
      for (const grupa of data.wyniki_katalogu) {
        const brakWynikow = !grupa.wyniki || grupa.wyniki.length === 0;
        html += `<div class="katalog-group">
          <div class="katalog-query">
            🔎 <strong>${escHtml(grupa.zapytanie)}</strong>
            ${brakWynikow
              ? `<span style="color:#666;">— brak w katalogu</span>`
              : `— ${grupa.total} w katalogu`}
            <a href="${escHtml(grupa.gs_link)}" target="_blank">Google Scholar →</a>
          </div>`;
        for (const w of (grupa.wyniki || [])) {
          html += `<div class="katalog-item">
            <div class="katalog-item-title">${escHtml(w.tytul)}</div>
            ${w.status ? `<div class="katalog-item-status">${escHtml(w.status)}</div>` : ''}
          </div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    } else {
      if (data.blad_debug) {
        html += `<p style="color:#f87171;font-size:0.8rem;margin-top:10px;">⚠ Błąd katalogu: ${escHtml(data.blad_debug)}</p>`;
      }
      if (data.zapytania_debug?.length) {
        html += `<p style="color:#666;font-size:0.78rem;margin-top:6px;">Szukano: ${data.zapytania_debug.map(escHtml).join(' | ')}</p>`;
      }
      html += `<p style="color:#666;font-size:0.85rem;margin-top:6px;">Nie znaleziono powiązanych pozycji w katalogu.</p>`;
    }

    div.innerHTML = `<div class="avatar">📚</div><div class="bubble" style="max-width:680px;">${html}</div>`;
    chat.appendChild(div);
    scrollBottom();
  }

  function appendError(msg) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="avatar">📚</div><div class="bubble" style="color:#f87171;">Błąd: ${escHtml(msg)}</div>`;
    chat.appendChild(div);
    scrollBottom();
  }

  function appendTyping() {
    const chat = document.getElementById('chat');
    const id = 'typing-' + Date.now();
    const div = document.createElement('div');
    div.className = 'msg bot'; div.id = id;
    div.innerHTML = `<div class="avatar">📚</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    chat.appendChild(div);
    scrollBottom();
    return id;
  }

  function removeTyping(id) { document.getElementById(id)?.remove(); }

  function setLoading(v) {
    isLoading = v;
    document.getElementById('sendBtn').disabled = v;
    document.getElementById('pdfBtn').disabled = v;
  }

  function askSuggestion(query) {
    document.getElementById('promptInput').value = `Znajdź książki o: ${query}`;
    send();
  }

  function scrollBottom() {
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById('topStatus');
    el.textContent = msg;
    el.className = isError ? 'error' : '';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(s) { return String(s).replace(/'/g,"\\'"); }
</script>
</body>
</html>
