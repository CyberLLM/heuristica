  <style>
    :root {
      --bg-primary:   #0D1117;
      --bg-secondary: #161B22;
      --bg-tertiary:  #21262D;
      --border-color: #30363D;
      --text-primary: #E6EDF3;
      --text-muted:   #8B949E;
      --text-link:    #58A6FF;
      --accent-green: #2A7A5B;
      --tag-green:    #3FB950;
      --font-body:    system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono:    'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      --nav-height:   53px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    a { color: var(--text-link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ===== NAV ===== */
    .top-nav {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 24px;
      flex-shrink: 0;
      z-index: 100;
    }

    .top-nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 16px;
      color: var(--text-primary);
    }

    .nav-logo .logo-mark {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent-green), #1a5a3d);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
    }

    .nav-title {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-muted);
      border-left: 1px solid var(--border-color);
      padding-left: 16px;
      margin-left: 4px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-links a {
      color: var(--text-muted);
      font-size: 13px;
    }

    .nav-links a:hover { color: var(--text-primary); text-decoration: none; }

    /* ===== VIEW MODE LAYOUT ===== */
    #view-mode {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== TOC SIDEBAR ===== */
    .toc-panel {
      width: 240px;
      flex-shrink: 0;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      overflow-y: auto;
      padding: 20px 0;
    }

    .toc-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 8px;
    }

    .toc-nav a {
      display: block;
      padding: 5px 16px;
      font-size: 13px;
      color: var(--text-muted);
      border-left: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toc-nav a:hover {
      color: var(--text-primary);
      border-left-color: var(--text-link);
      text-decoration: none;
    }

    .toc-nav a.toc-h1 { font-weight: 600; padding-left: 16px; }
    .toc-nav a.toc-h2 { padding-left: 28px; }
    .toc-nav a.toc-h3 { padding-left: 40px; font-size: 12px; }

    .toc-empty {
      font-size: 12px;
      color: var(--text-muted);
      padding: 8px 16px;
      font-style: italic;
    }

    /* ===== CONTENT PANEL ===== */
    .content-main {
      flex: 1;
      overflow-y: auto;
      padding: 36px 56px;
    }

    .content-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .dl-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-body);
      padding: 5px 12px;
      transition: color 0.15s, border-color 0.15s;
    }

    .dl-btn:hover {
      color: var(--text-primary);
      border-color: var(--text-muted);
    }

    @media print {

      background: transparent;

      border-radius: 5px;

      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-mono);

      padding: 4px 8px;

    .tb-sep {

    /* ===== FLOATING EDIT BUTTON ===== */
    .edit-fab {
      position: fixed;

      right: 28px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 18px;

      display: flex;
      align-items: center;

      z-index: 90;

    .edit-fab:hover {

      border-color: var(--text-link);

      position: fixed;

      font-size: 16px;
      margin-bottom: 16px;

    .modal-input {
      width: 100%;
      background: var(--bg-primary);

      font-size: 14px;
      outline: none;

      font-family: var(--font-body);
    }

    .modal-input:focus { border-color: var(--text-link); }

    .modal-error {
      font-size: 12px;
      color: #f85149;
      min-height: 16px;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 13px;
      padding: 6px 16px;
      font-family: var(--font-body);
    }

    .modal-btn:hover { background: var(--border-color); }

    .modal-btn.primary {
      background: var(--text-link);

      #md-editor { border-right: none; border-bottom: 1px solid var(--border-color); }

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>

  <script>
    // ============================================================
    //  KONFIGURACJA — UZUPELNIJ PO ZALOZENIU PROJEKTU FIREBASE
    // ============================================================
    const firebaseConfig = {
      apiKey:            "AIzaSyDO673l7T6-rFfIMxAmQLkvn4gb9dBJKf4",
      authDomain:        "worhshop-site.firebaseapp.com",
      projectId:         "worhshop-site",
      storageBucket:     "worhshop-site.firebasestorage.app",
      messagingSenderId: "1028020934126",
      appId:             "1:1028020934126:web:d21ad93466afc255af6aff",
      measurementId:     "G-ZXBJWLNQNV"
    };

    // Haslo do trybu edycji — zmien na wlasne
    const EDIT_PASSWORD = 'warsztat2026';

    // ============================================================
    //  FIREBASE INIT
    // ============================================================
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection('workshops').doc('main');

    let saveTimer      = null;
    let isEditMode     = false;
    let currentContent = '';

    // ============================================================
    //  MARKED.JS CONFIG
    // ============================================================
    marked.setOptions({ breaks: true, gfm: true });

    // ============================================================
    //  REAL-TIME LISTENER
    // ============================================================
    docRef.onSnapshot(snap => {
      const content = (snap.exists && snap.data().content) ? snap.data().content : '';
      currentContent = content;
      if (!isEditMode) renderView(content);
    }, err => {
      console.error('Firestore error:', err);
      if (!isEditMode) {
        document.getElementById('rendered-content').innerHTML =
          '<div class="error-state">Blad polaczenia z baza danych.<br>Sprawdz konfiguracje Firebase.</div>';
      }
    });

    // ============================================================
    //  VIEW MODE
    // ============================================================
    function renderView(mdText) {
      const container = document.getElementById('rendered-content');

      if (!mdText || !mdText.trim()) {
        container.innerHTML = '<div class="empty-state">Prowadzacy przygotowuje materialy...<br>Odswiez strone za chwile.</div>';
        document.getElementById('toc-nav').innerHTML = '<div class="toc-empty">Brak tresci</div>';
        document.getElementById('content-toolbar').style.display = 'none';
        return;
      }

      container.innerHTML = marked.parse(mdText);
      addHeadingIds(container);
      buildTOC(container);
      document.getElementById('content-toolbar').style.display = 'flex';
    }

    function addHeadingIds(container) {
      const seen = {};
      container.querySelectorAll('h1, h2, h3, h4').forEach(h => {
        let base = slugify(h.textContent);
        let id   = base;
        if (seen[base]) { seen[base]++; id = base + '-' + seen[base]; } else { seen[base] = 1; }
        h.id = id;
      });
    }

    function slugify(text) {
      return text.toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^\w-]/g, '')
        .replace(/^-+|-+$/g, '') || 'heading';
    }

    function buildTOC(container) {
      const headings = container.querySelectorAll('h1, h2, h3');
      const tocNav   = document.getElementById('toc-nav');
      if (headings.length === 0) {
        tocNav.innerHTML = '<div class="toc-empty">Brak nagłówków</div>';
        return;
      }
      let html = '';
      headings.forEach(h => {
        const level = parseInt(h.tagName[1]);
        html += `<a class="toc-h${level}" href="#${h.id}">${escHtml(h.textContent)}</a>`;
      });
      tocNav.innerHTML = html;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ============================================================
    //  EDIT MODE — AUTH
    // ============================================================
    function tryEnterEdit() {
      document.getElementById('pw-overlay').style.display = 'flex';
      document.getElementById('pw-error').textContent = '';
      document.getElementById('pw-input').value = '';
      setTimeout(() => document.getElementById('pw-input').focus(), 40);
    }

    function closePwModal() {
      document.getElementById('pw-overlay').style.display = 'none';
    }

    function checkPw() {
      if (document.getElementById('pw-input').value === EDIT_PASSWORD) {
        closePwModal();
        enterEdit();
      } else {
        document.getElementById('pw-error').textContent = 'Nieprawidlowe haslo.';
        document.getElementById('pw-input').select();
      }
    }

    // ============================================================
    //  EDIT MODE — ENTER / EXIT
    // ============================================================
    function enterEdit() {
      isEditMode = true;
      document.getElementById('view-mode').style.display = 'none';
      document.getElementById('edit-mode').style.display  = 'flex';
      document.getElementById('edit-fab').style.display   = 'none';

      const editor = document.getElementById('md-editor');
      editor.value = currentContent;
      renderEditorPreview();
      editor.focus();
    }

    function exitEdit() {
      // Zapisz jeszcze raz przed wyjsciem jesli sa niezapisane zmiany
      if (saveTimer) {
        clearTimeout(saveTimer);
        saveContent();
      }
      isEditMode = false;
      document.getElementById('edit-mode').style.display  = 'none';
      document.getElementById('view-mode').style.display  = 'flex';
      document.getElementById('edit-fab').style.display   = 'flex';
      renderView(currentContent);
    }

    // ============================================================
    //  EDITOR — INPUT + SAVE
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('md-editor').addEventListener('input', onEditorInput);
    });

    function onEditorInput() {
      renderEditorPreview();
      setSaveStatus('Zapisywanie...', 'status-saving');
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveContent, 1500);
    }

    function renderEditorPreview() {
      const md      = document.getElementById('md-editor').value;
      const preview = document.getElementById('editor-preview');
      preview.innerHTML = marked.parse(md);
    }

    async function saveContent() {
      saveTimer = null;
      const content = document.getElementById('md-editor').value;
      currentContent = content;
      try {
        await docRef.set({
          content,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        setSaveStatus('Zapisano', 'status-ok');
        setTimeout(() => setSaveStatus('', ''), 2500);
      } catch (e) {
        setSaveStatus('Blad zapisu!', 'status-err');
        console.error(e);
      }
    }

    function setSaveStatus(msg, cls) {
      const el = document.getElementById('save-status');
      el.textContent  = msg;
      el.className    = 'save-status ' + (cls || '');
    }

    // ============================================================
    //  TOOLBAR HELPERS
    // ============================================================
    function getEditor() { return document.getElementById('md-editor'); }

    function insertHeading(level) {
      const prefix = '#'.repeat(level) + ' ';
      const ta     = getEditor();
      const start  = ta.selectionStart;
      const lineStart = ta.value.lastIndexOf('\n', start - 1) + 1;
      const lineText  = ta.value.substring(lineStart);

      // Toggle: jesli juz ma ten heading, usun; inaczej dodaj
      const existing = lineText.match(/^(#{1,6}) /);
      if (existing) {
        ta.setRangeText('', lineStart, lineStart + existing[0].length, 'start');
        if (existing[1] !== '#'.repeat(level)) {
          ta.setRangeText(prefix, lineStart, lineStart, 'end');
        }
      } else {
        ta.setRangeText(prefix, lineStart, lineStart, 'end');
      }
      ta.dispatchEvent(new Event('input'));
      ta.focus();
    }

    function insertAtLineStart(prefix) {
      const ta        = getEditor();
      const start     = ta.selectionStart;
      const lineStart = ta.value.lastIndexOf('\n', start - 1) + 1;
      ta.setRangeText(prefix, lineStart, lineStart, 'end');
      ta.dispatchEvent(new Event('input'));
      ta.focus();
    }

    function wrapSel(before, after) {
      const ta       = getEditor();
      const s        = ta.selectionStart;
      const e        = ta.selectionEnd;
      const selected = ta.value.substring(s, e) || 'tekst';
      ta.setRangeText(before + selected + after, s, e, 'select');
      ta.dispatchEvent(new Event('input'));
      ta.focus();
    }

    function insertCodeBlock() {
      const ta       = getEditor();
      const s        = ta.selectionStart;
      const e        = ta.selectionEnd;
      const selected = ta.value.substring(s, e) || 'kod';
      const insertion = '\n```\n' + selected + '\n```\n';
      ta.setRangeText(insertion, s, e, 'end');
      ta.dispatchEvent(new Event('input'));
      ta.focus();
    }

    function insertSeparator() {
      const ta    = getEditor();
      const s     = ta.selectionStart;
      ta.setRangeText('\n\n---\n\n', s, s, 'end');
      ta.dispatchEvent(new Event('input'));
      ta.focus();
    }

    function insertLink() {
      const url = prompt('URL:');
      if (!url) return;
      const ta       = getEditor();
      const s        = ta.selectionStart;
      const e        = ta.selectionEnd;
      const label    = ta.value.substring(s, e) || 'link';
      ta.setRangeText('[' + label + '](' + url + ')', s, e, 'end');
      ta.dispatchEvent(new Event('input'));
      ta.focus();
    }
    // ============================================================
    //  DOWNLOAD
    // ============================================================
    function downloadMd() {
      const blob = new Blob([currentContent], { type: 'text/markdown' });
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = 'workshop.md';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function downloadPdf() {
      window.print();
    }

  </script>

  <!-- Tally forms -->
  <script async src="https://tally.so/widgets/embed.js"></script>
